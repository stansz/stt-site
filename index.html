<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Text | OGS Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-4 text-center">
        <h1 class="text-2xl font-bold mb-3">🎙️ Speech to Text</h1>
        <div class="flex justify-center gap-2">
            <button id="modeRealtime" class="mode-btn active">Real-time</button>
            <button id="modeRecord" class="mode-btn">Record</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <button id="micButton" class="mic-button" title="Click to start">
            <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 10v2a7 7 0 01-14 0v-2"/>
                <line stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" x1="12" y1="19" x2="12" y2="23"/>
                <line stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>

        <div id="status" class="status-text"></div>

        <div id="progressContainer" class="progress-container hidden">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressLabel" class="progress-label"></div>

        <div class="transcript-box">
            <div id="transcript" class="transcript-content"></div>
        </div>

        <div class="flex gap-3 mt-4">
            <button id="copyButton" class="action-btn">📋 Copy</button>
            <button id="clearButton" class="action-btn">🗑️ Clear</button>
        </div>

        <div class="mt-4">
            <select id="languageSelect" class="lang-select">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="ja">Japanese</option>
                <option value="zh">Chinese</option>
            </select>
        </div>
    </main>

    <footer class="p-3 text-center text-sm opacity-60">
        Powered by 🤗 Transformers.js — All processing in your browser
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
